            overflow-x: hidden;

        const { useState, useEffect } = React;

          '科技前沿': [
            { id: 't1', claim: '量子计算机可以瞬间破解目前世界上所有的加密算法。', isFact: false, explanation: '目前量子比特数和纠错能力远达不到破解现代高强度加密（如RSA-2048）的水平。' },
            { id: 't2', claim: '5G信号不会导致人类DNA变异或产生辐射病。', isFact: true, explanation: '5G使用的是非电离辐射，其能量不足以破坏化学键或导致DNA变异。' },
            { id: 't3', claim: 'AI生成的画作在目前大多数国家法律下不享有著作权。', isFact: true, explanation: '多数国家法律目前只认可“人类创作者”，纯AI生成内容通常被视为公有领域。' },

            { id: 't5', claim: '目前的L3级自动驾驶意味着驾驶员在任何时候都无需干预。', isFact: false, explanation: 'L3级是有条件自动化，系统负责监控，但在必要时（如系统报错）要求驾驶员立即接管。' },
            { id: 't6', claim: '所有的NFT（非同质化代币）在区块链上都存储了完整的原始图像数据。', isFact: false, explanation: '绝大多数NFT只存储一个指向外部图像地址的链接（如IPFS或中心化服务器链接），而非图像本身。' },
            { id: 't7', claim: '锂电池在充电到100%后继续插着电源会严重伤害电池寿命。', isFact: false, explanation: '现代电子设备有完善的电源管理系统，充满后会自动切换到外部供电并停止给电池充电。' },
            { id: 't8', claim: 'ChatGPT等大模型具有自我意识和真实的情感感受。', isFact: false, explanation: '大模型本质上是基于概率的文本预测器，其“情感表达”是模仿训练数据的结果，而非真实意识。' },
            { id: 't9', claim: '人造卫星在轨运行期间，其实不需要消耗任何能量来维持速度。', isFact: true, explanation: '在真空中，根据牛顿第一定律，一旦加速到轨道速度，卫星将保持惯性运动，消耗能量主要是为了姿态调整。' },
            { id: 't10', claim: '虚拟现实(VR)眩晕症的主要原因是画面延迟超过了人脑的处理速度。', isFact: true, explanation: '当视觉信号（我在动）与前庭信号（我坐着）不一致时，大脑会产生保护性眩晕。' },
            { id: 't11', claim: 'SpaceX的回收火箭技术是人类历史上第一次实现垂直起降火箭回收。', isFact: false, explanation: '虽然SpaceX实现了商业化成功，但DC-X实验飞行器在90年代就演示过垂直起降技术。' },
            { id: 't12', claim: '比特币的交易是完全匿名、不可追踪的。', isFact: false, explanation: '比特币是伪匿名的，所有交易记录在公开账本上，通过链上分析可以关联到特定实体。' },
            { id: 't13', claim: 'Wi-Fi 7的理论峰值速率超过了40Gbps。', isFact: true, explanation: 'Wi-Fi 7通过320MHz频宽、4096-QAM等技术极大提升了传输上限。' },
            { id: 't14', claim: '目前人类已经可以大规模生产石墨烯手机屏幕。', isFact: false, explanation: '由于高质量、大面积石墨烯生产成本极高且工艺复杂，目前尚处于实验室或小规模应用阶段。' },
            { id: 't15', claim: '深海光缆是目前全球互联网跨洲际传输的最主要物理载体。', isFact: true, explanation: '超过99%的跨洲际数据流量是通过海底光缆传输的，卫星传输仅占极小份额。' },
            { id: 't16', claim: '固态电池目前已经完全取代了液态锂电池在乘用车上的应用。', isFact: false, explanation: '固态电池仍面临生产成本和循环寿命挑战，目前仅在极少数高端车型上进行半固态试点。' },
            { id: 't17', claim: '所谓的“隐身战机”并不是在肉眼里隐形，而是在雷达波面前“隐身”。', isFact: true, explanation: '隐身战机通过特殊外形和涂层吸收反射雷达波，使其在雷达屏幕上看起来像只小鸟。' },

            { id: 't23', claim: '目前所有的自动驾驶卡车在行驶时都必须配备人类安全员。', isFact: false, explanation: '在部分地区（如美国、中国特定区域），已获批开展无安全员的自动驾驶卡车测试或运营。' },
            { id: 't24', claim: '液冷散热技术目前仅用于超级计算机和游戏PC。', isFact: false, explanation: '液冷技术已广泛应用于数据中心服务器和部分高性能智能手机内部。' },
            { id: 't25', claim: '光刻机的波长越短，能蚀刻出的电路图案就越精细。', isFact: true, explanation: '这是根据衍射极限原理，EUV（极紫外光）使用13.5nm波长，远短于DUV。' },
            { id: 't26', claim: '目前人类已经可以通过3D生物打印技术制造出具有完整功能的活体心脏。', isFact: false, explanation: '目前能打印出组织支架和微型心脏模型，但具有复杂血液循环和泵血功能的完整器官尚未实现。' },
            { id: 't27', claim: '私有云比公有云在安全性上具有绝对的领先优势。', isFact: false, explanation: '安全性取决于管理水平；大型公有云服务商拥有更专业的安全团队和更新及时的安全补丁。' },
            { id: 't28', claim: '量子纠缠可以实现超光速的信息瞬间传输。', isFact: false, explanation: '量子纠缠虽然是非定域的，但由于“无通信定理”，无法通过它传递有意义的信息。' },
            { id: 't29', claim: '目前的碳纳米管技术已经可以制作出全功能的碳基微处理器。', isFact: true, explanation: '麻省理工学院等机构已成功研制出完全由碳纳米管晶体管制成的16位微处理器。' },
            { id: 't30', claim: 'Starlink卫星具有自动避让空间碎片的自主机动能力。', isFact: true, explanation: '每颗星链卫星都配备了氪离子推进器和自主碰撞预测避让系统。' }

          '科学百科': [
            { id: 's1', claim: '金鱼的记忆力实际上可以持续数月。', isFact: true, explanation: '“7秒记忆”是谣言，实验证明金鱼能记住复杂的迷宫和色彩识别。' },

            { id: 's4', claim: '闪电从来不会在同一个地方击中两次。', isFact: false, explanation: '闪电倾向于击中高耸孤立的目标，帝国的摩天大楼每年被击中多次。' },
            { id: 's5', claim: '蝙蝠是完全的瞎子，只能靠超声波看路。', isFact: false, explanation: '绝大多数蝙蝠都有视力，有些大蝙蝠（如狐蝠）视力极佳，主要靠眼看而非声呐。' },

            { id: 's8', claim: '玻璃其实是一种流速极慢的液体，所以古窗户下面比较厚。', isFact: false, explanation: '玻璃是无定形固体。古窗户下部厚是制造工艺（吹制圆盘法）导致的安装选择，而非流动。' },
            { id: 's9', claim: '牛看到红色就会变得愤怒并冲向斗牛士。', isFact: false, explanation: '牛是红绿色盲，让它愤怒的是斗牛士挥舞红布时的剧烈动作和挑衅。' },
            { id: 's10', claim: '企鹅其实是有膝盖的，只是隐藏在厚厚的羽毛和皮下脂肪里。', isFact: true, explanation: '企鹅的骨骼结构显示它们有非常标准的膝关节，只是腿部很短。' },
            { id: 's11', claim: '如果一个人在真空中不穿宇航服，他的身体会瞬间爆炸。', isFact: false, explanation: '由于皮肤的弹性和体液的压力，身体不会爆炸，但会由于缺氧昏迷和体液沸腾（阿姆斯特朗极限）。' },
            { id: 's12', claim: '珠穆朗玛峰是距离地心最远的地方。', isFact: false, explanation: '由于地球是赤道隆起的椭球体，厄瓜多尔的钦博拉索山顶才是离地心最远的点。' },

                    </div>

                )}

              <footer className="w-full mt-24 pt-10 border-t-2 border-[#1D1D1F] flex flex-col sm:flex-row justify-between items-center text-[10px] font-black text-gray-400 tracking-widest gap-6 uppercase">

          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
